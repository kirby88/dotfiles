# cf. https://superuser.com/a/570464 for switching windows with cmd
# A lot was taken from these videos https://thoughtbot.com/upcase/videos/tmux-vim-integration

# Use the tmux terminfo entry (supports italics; recommended over screen-256color)
set-option -g default-terminal "tmux-256color"

# Advertise 24-bit truecolor to programs running inside tmux so brand/hex colors
# aren't quantized to the 256-color palette. Requires the outer terminal to
# support truecolor. "Tc"/"RGB" are what apps (e.g. Bubble Tea's colorprofile,
# via `tmux info`) probe to decide whether to emit true RGB.
set-option -ga terminal-overrides ",*:Tc"
set-option -as terminal-features ",*:RGB"

# Change prefix to ctrl+space
unbind C-b
set-option -g prefix C-Space
bind -r C-Space send-prefix # Allows to send ctrl-space to process inside tmux when we repeat ctrl-j

# Set status bar at the top
set-option -g status-position top

# split panes using v and h
bind v split-window -v -c "#{pane_current_path}"
bind s split-window -h -c "#{pane_current_path}"
unbind '"'
unbind %
bind t new-window -c "#{pane_current_path}"
bind w confirm-before kill-window \; display "> Window closed"
bind q kill-pane \; display "> Pane closed"

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf \; display "> .tmux.conf reloaded!"

# enable ctrl+a etc.. in console
#set -g mode-keys emacs
#set -g status-keys emacs

# switch panes using Alt-arrow without prefix
bind l select-pane -R
bind h select-pane -L
bind k select-pane -U
bind j select-pane -D

bind -n S-Left resize-pane -L 2
bind -n S-Right resize-pane -R 2
bind -n S-Down resize-pane -D 1
bind -n S-Up resize-pane -U 1

bind W break-pane # Break pane into its own window

# Switch through windows with C-Tab
bind tab next-window
bind S-tab previous-window

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g pane-border-status off

# Status bar
# bind-key t set-option status # toggle status bar display
# -------------
# status line
# -------------
set -g status-justify left
#set -g status-bg black
set -g status-bg colour236
set -g status-fg white
set -g status-interval 4

# emoji badge + session name on the left
set -g status-left "#[fg=colour234,bg=colour69,bold] 🖥️  TMUX #[fg=colour252,bg=colour239] #S #[fg=colour239,bg=colour236] "
set -g status-left-length 40

# -------------
# window status
# -------------
setw -g window-status-format "#[fg=colour245,bg=colour236] #I #[fg=colour250]#T "
setw -g window-status-current-format "#[fg=colour234,bg=colour69,bold] #I #[fg=colour234,bg=colour75] #T "
setw -g window-status-current-style bg=colour236,fg=colour231,bold
setw -g window-status-style bg=colour236,fg=colour153
set -g status-right ''
set -g status-right-length 60

# Fix lag when switching modes in Vim
set -sg escape-time 0

set -g default-command /bin/zsh
